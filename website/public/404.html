<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>CobaltDB</title>
    <script>
      // GitHub Pages SPA redirect: convert path to query param so index.html can handle it
      var pathSegmentsToKeep = 0; // Change to 1 if hosted at username.github.io/repo-name
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
