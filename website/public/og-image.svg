<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="cobalt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="50%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#09090b;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Dot grid -->
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.8" fill="#38bdf8" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Top gradient line -->
  <rect x="200" y="0" width="800" height="1" fill="url(#cobalt)" opacity="0.4"/>
  <!-- Database icon -->
  <g transform="translate(540, 160)">
    <ellipse cx="60" cy="10" rx="50" ry="14" fill="none" stroke="url(#cobalt)" stroke-width="3"/>
    <path d="M10,10 L10,60 Q10,74 60,74 Q110,74 110,60 L110,10" fill="none" stroke="url(#cobalt)" stroke-width="3"/>
    <ellipse cx="60" cy="36" rx="50" ry="14" fill="none" stroke="url(#cobalt)" stroke-width="2" opacity="0.4"/>
    <ellipse cx="60" cy="60" rx="50" ry="14" fill="none" stroke="url(#cobalt)" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="#0ea5e9">Cobalt</tspan><tspan fill="#fafafa">DB</tspan>
  </text>
  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" fill="#a1a1aa" font-weight="400">
    Modern Embeddable SQL Database
  </text>
  <!-- Feature pills -->
  <g transform="translate(600, 420)" text-anchor="middle">
    <g transform="translate(-250, 0)">
      <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#27272a"/>
      <text y="5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a1a1aa" font-weight="500">ACID</text>
    </g>
    <g transform="translate(-125, 0)">
      <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#27272a"/>
      <text y="5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a1a1aa" font-weight="500">WASM</text>
    </g>
    <g transform="translate(0, 0)">
      <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#27272a"/>
      <text y="5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a1a1aa" font-weight="500">Pure Go</text>
    </g>
    <g transform="translate(125, 0)">
      <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#27272a"/>
      <text y="5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a1a1aa" font-weight="500">FTS</text>
    </g>
    <g transform="translate(250, 0)">
      <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#27272a"/>
      <text y="5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a1a1aa" font-weight="500">JSON</text>
    </g>
  </g>
  <!-- Stats -->
  <g transform="translate(600, 510)" text-anchor="middle" font-family="system-ui,sans-serif">
    <text x="-200" y="0" font-size="28" font-weight="800" fill="#0ea5e9">100K+</text>
    <text x="-200" y="24" font-size="12" fill="#71717a">QPS</text>
    <text x="0" y="0" font-size="28" font-weight="800" fill="#0ea5e9">5000+</text>
    <text x="0" y="24" font-size="12" fill="#71717a">Tests</text>
    <text x="200" y="0" font-size="28" font-weight="800" fill="#0ea5e9">90%+</text>
    <text x="200" y="24" font-size="12" fill="#71717a">Coverage</text>
  </g>
  <!-- Bottom line -->
  <rect x="200" y="590" width="800" height="1" fill="url(#cobalt)" opacity="0.2"/>
  <text x="600" y="615" text-anchor="middle" font-family="monospace" font-size="13" fill="#52525b">github.com/cobaltdb/cobaltdb</text>
</svg>
