name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 300s

      - name: Race detector (critical packages)
        run: CGO_ENABLED=1 go test -race ./pkg/... ./cmd/cobaltdb-server ./webui -count=1 -timeout 300s

      - name: Coverage summary
        run: |
          go test ./pkg/... -coverprofile=coverage.out -count=1
          go tool cover -func=coverage.out | tail -1

      - name: Security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Vulnerability scan
        run: govulncheck ./...

      - name: Static security scan
        run: gosec -exclude=G104 ./...

      - name: Production compose config
        env:
          COBALTDB_ADMIN_PASSWORD: release-admin-password
          COBALTDB_CERTS_DIR: /tmp
        run: |
          docker compose -f docker-compose.prod.yml config >/tmp/cobaltdb-compose-prod.yml
          grep -q 'COBALTDB_ALLOW_CLEARTEXT_AUTH: "false"' /tmp/cobaltdb-compose-prod.yml
          grep -q 'COBALTDB_MYSQL_ENABLED: "false"' /tmp/cobaltdb-compose-prod.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build cobaltdb-server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          mkdir -p dist
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/cobaltdb-server-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/cobaltdb-server

      - name: Build cobaltdb-cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "dist/cobaltdb-cli-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/cobaltdb-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cobaltdb-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 * > checksums.txt
          cat checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          {
            echo 'changelog<<CHANGELOG_EOF'
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges
            else
              git log --pretty=format:"- %s" --no-merges -20
            fi
            echo ''
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## CobaltDB ${{ github.ref_name }}

            ### Changes since ${{ steps.changelog.outputs.prev_tag }}
            ${{ steps.changelog.outputs.changelog }}

            ### Installation

            **Go library:**
            ```bash
            go get github.com/cobaltdb/cobaltdb@${{ github.ref_name }}
            ```

            **Server binary:** Download the appropriate binary below for your platform.
            **CLI binary:** Also available for all platforms (`cobaltdb-cli-*`).

            ### Platforms
            | OS | Arch | Server | CLI |
            |---|---|---|---|
            | Linux | amd64 | `cobaltdb-server-linux-amd64` | `cobaltdb-cli-linux-amd64` |
            | Linux | arm64 | `cobaltdb-server-linux-arm64` | `cobaltdb-cli-linux-arm64` |
            | macOS | amd64 | `cobaltdb-server-darwin-amd64` | `cobaltdb-cli-darwin-amd64` |
            | macOS | arm64 | `cobaltdb-server-darwin-arm64` | `cobaltdb-cli-darwin-arm64` |
            | Windows | amd64 | `cobaltdb-server-windows-amd64.exe` | `cobaltdb-cli-windows-amd64.exe` |

            Verify downloads with `checksums.txt`:
            ```bash
            shasum -a 256 -c checksums.txt --ignore-missing
            ```
          files: dist/*
