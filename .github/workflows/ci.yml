name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Lint
        run: golangci-lint run ./...

      - name: Build all packages
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit + integration tests
        run: go test ./pkg/... ./integration/... ./test/... -count=1 -timeout 300s

      - name: Race detector (core packages)
        run: CGO_ENABLED=1 go test -race ./pkg/catalog/... ./pkg/engine/... ./pkg/storage/... -count=1 -timeout 300s

      - name: Test coverage
        run: |
          go test ./pkg/... -coverprofile=coverage.out -count=1
          go tool cover -func=coverage.out | tail -1
          echo "### Coverage by package" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | grep -E "total:|pkg/" | tail -21 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Build examples
        run: go build ./examples/...

      - name: Build CLI and Server
        run: |
          go build -o bin/cobaltdb-server ./cmd/cobaltdb-server
          go build -o bin/cobaltdb-cli ./cmd/cobaltdb-cli

      - name: Install security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Vulnerability scan
        run: govulncheck ./...

      - name: Static security scan
        run: gosec -exclude=G104,G115,G118,G304,G301,G306,G401,G402,G505 ./cmd/cobaltdb-server ./pkg/server ./pkg/protocol ./pkg/storage ./pkg/auth ./sdk/go ./pkg/logger ./pkg/query
