name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: gofmt check
        run: |
          unformatted="$(gofmt -l ./pkg ./cmd ./sdk ./integration ./test)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$unformatted"
            echo "Run 'make fmt' to fix."
            exit 1
          fi
          echo "gofmt clean."

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Lint
        run: golangci-lint run ./...

      - name: Build all packages
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit + integration tests (lean, fast feedback)
        run: go test ./... -count=1 -timeout 300s

      - name: Unit + integration tests (full, includes coverage_padding)
        run: go test -tags coverage_padding ./... -count=1 -timeout 600s

      - name: Race detector (pkg packages)
        run: CGO_ENABLED=1 go test -tags coverage_padding -race ./pkg/... -count=1 -timeout 600s

      - name: Race detector (server and webui)
        run: CGO_ENABLED=1 go test -race ./cmd/cobaltdb-server ./webui -count=1 -timeout 300s

      - name: Test coverage (full suite)
        run: |
          go test -tags coverage_padding ./pkg/... -coverprofile=coverage.out -count=1
          go tool cover -func=coverage.out | tail -1
          echo "### Coverage by package" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | grep -E "total:|pkg/" | tail -21 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Build examples
        run: go build ./examples/...

      - name: Build CLI and Server
        run: |
          go build -o bin/cobaltdb-server ./cmd/cobaltdb-server
          go build -o bin/cobaltdb-cli ./cmd/cobaltdb-cli

      - name: Docker compose config
        env:
          COBALTDB_ADMIN_PASSWORD: ci-admin-password
          GRAFANA_ADMIN_PASSWORD: ci-grafana-password
          COBALTDB_CERTS_DIR: /tmp
        run: |
          docker compose config >/tmp/cobaltdb-compose.yml
          docker compose -f docker-compose.prod.yml config >/tmp/cobaltdb-compose-prod.yml
          grep -q 'COBALTDB_ALLOW_CLEARTEXT_AUTH: "true"' /tmp/cobaltdb-compose.yml
          grep -q 'COBALTDB_ALLOW_CLEARTEXT_AUTH: "false"' /tmp/cobaltdb-compose-prod.yml
          grep -q 'COBALTDB_MYSQL_ENABLED: "false"' /tmp/cobaltdb-compose-prod.yml

      - name: Docker build
        run: docker build -t cobaltdb:ci .

      - name: Install security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Vulnerability scan
        run: govulncheck ./...

      - name: Static security scan
        run: gosec -exclude=G104 ./...
