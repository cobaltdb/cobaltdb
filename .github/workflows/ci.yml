name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race tests
        run: CGO_ENABLED=1 go test -race ./...

      - name: Install security and lint tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Vulnerability scan
        run: govulncheck ./...

      - name: Static security scan
        run: gosec -exclude=G115,G118,G304,G301,G306,G401,G402,G505 ./cmd/cobaltdb-server ./pkg/server ./pkg/protocol ./pkg/storage ./pkg/auth ./sdk/go ./pkg/logger ./pkg/query

      - name: Lint
        run: golangci-lint run --tests=false --disable-all --enable=errcheck --enable=govet ./cmd/cobaltdb-server ./pkg/server ./pkg/protocol ./pkg/storage ./pkg/auth ./sdk/go ./pkg/logger ./pkg/query
