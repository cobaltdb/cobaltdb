# CobaltDB Configuration File
# This is the main configuration file for CobaltDB Server

[server]
# Server configuration
host = "0.0.0.0"
port = 4200
max_connections = 100
connection_timeout = "30s"
query_timeout = "60s"

# TLS Configuration
tls_enabled = false
tls_cert_file = "/etc/cobaltdb/certs/server.crt"
tls_key_file = "/etc/cobaltdb/certs/server.key"
tls_ca_file = "/etc/cobaltdb/certs/ca.crt"

[storage]
# Storage configuration
data_dir = "/data/cobaltdb"
page_size = 4096
cache_size = 1024
wal_enabled = true
sync_mode = "normal"

# Encryption (optional)
encryption_enabled = false
# encryption_key_file = "/etc/cobaltdb/keys/master.key"

[performance]
# Performance tuning
query_plan_cache_enabled = true
query_plan_cache_size = 1000
statement_cache_size = 1000
max_parallel_workers = 4

[security]
# Security settings
auth_enabled = false
# jwt_secret = "your-secret-key"
# password_encryption = "argon2"

# Row-Level Security
rls_enabled = false

# Audit logging
audit_enabled = false
audit_format = "json"
audit_log_file = "/data/cobaltdb/audit.log"
audit_log_dml = true
audit_log_ddl = true

[monitoring]
# Monitoring and metrics
metrics_enabled = true
metrics_port = 8420
metrics_path = "/metrics"
prometheus_enabled = true

# Health check
health_check_enabled = true
health_check_interval = "30s"

# Slow query logging
slow_query_enabled = true
slow_query_threshold = "1s"
slow_query_max_entries = 1000

[logging]
# Logging configuration
log_level = "info"
log_format = "json"
log_output = "stdout"
# log_file = "/data/cobaltdb/cobaltdb.log"
log_max_size = 100
log_max_age = 7
log_max_backups = 3

[replication]
# Read replica configuration
read_replicas_enabled = false
# replica_addresses = ["replica1:4201", "replica2:4201"]
replica_sync_mode = "async"
max_replica_lag = "5s"

[backup]
# Backup configuration
backup_enabled = true
backup_schedule = "0 2 * * *"
backup_retention_days = 7
backup_compression = true
pitr_enabled = true
pitr_retention_days = 7
