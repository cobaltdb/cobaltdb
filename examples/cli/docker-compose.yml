version: '3.8'

services:
  cobaltdb:
    build: .
    container_name: cobaltdb
    ports:
      - "14200:14200"
      - "3307:3307"
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - COBALTDB_ADMIN_USER=admin
      - COBALTDB_ADMIN_PASSWORD=changeme
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
