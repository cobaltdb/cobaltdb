services:
  cobaltdb:
    build: .
    ports:
      - "4200:4200"  # Wire protocol port
      - "3307:3307"  # MySQL protocol port (connect with any MySQL client)
      - "8420:8420"  # Health check / metrics port
    volumes:
      - cobaltdb_data:/data/cobaltdb
    environment:
      - COBALTDB_ADMIN_PASSWORD=${COBALTDB_ADMIN_PASSWORD:?Set COBALTDB_ADMIN_PASSWORD before starting CobaltDB}
      - COBALTDB_ADDR=:4200
      - COBALTDB_MYSQL_ADDR=:3307
      - COBALTDB_HEALTH_ADDR=:8420
      - COBALTDB_DATA_DIR=/data/cobaltdb
      - COBALTDB_AUTH_ENABLED=true
      - COBALTDB_REMOTE_METRICS_ENABLED=true
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8420/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - cobaltdb_network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v3.11.3
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - cobaltdb_network
    depends_on:
      cobaltdb:
        condition: service_healthy

  # Grafana for visualization
  grafana:
    image: grafana/grafana:13.0.1
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD before starting Grafana}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - cobaltdb_network
    depends_on:
      prometheus:
        condition: service_started

  # Backup service
  backup:
    profiles:
      - backup
    build:
      context: .
      dockerfile: Dockerfile.backup
    volumes:
      - cobaltdb_data:/data/source:ro
      - ./backups:/backups
    environment:
      - BACKUP_SCHEDULE=0 2 * * *  # Daily at 2 AM
      - BACKUP_INTERVAL_HOURS=24
      - BACKUP_RETENTION_DAYS=7
    depends_on:
      cobaltdb:
        condition: service_healthy
    networks:
      - cobaltdb_network

  # Real-world test service
  test:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "echo 'Waiting for CobaltDB...' &&
             echo 'Running real-world scenario test...' &&
             wget -q -O - http://cobaltdb:8420/ready >/dev/null &&
             echo 'Test completed successfully!'"
    depends_on:
      cobaltdb:
        condition: service_healthy
    networks:
      - cobaltdb_network
    profiles:
      - test  # Only run when explicitly requested

volumes:
  cobaltdb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  cobaltdb_network:
    driver: bridge
